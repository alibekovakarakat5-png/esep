<!DOCTYPE html>
<html lang="ru">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Esep — учёт доходов, расходов и налогов для ИП и ТОО Казахстана">
  <meta name="theme-color" content="#0F2B46">

  <!-- iOS PWA -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Esep">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='112' fill='%230F2B46'/%3E%3Cpolyline points='140 320 256 168 372 320' fill='none' stroke='%23F1F5F9' stroke-width='52' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"/>
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Esep — Учёт для бизнеса</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body { margin: 0; background-color: #F8F9FA; }
    #splash {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 12px; min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #splash-icon {
      width: 80px; height: 80px; background: linear-gradient(135deg, #0099CC, #007AA3);
      border-radius: 22px; display: flex; align-items: center;
      justify-content: center; box-shadow: 0 8px 32px rgba(0,153,204,0.3);
    }
    #splash-icon svg { width: 52px; height: 52px; }
    #splash-title { font-size: 26px; font-weight: 800; color: #1A1D23; letter-spacing: -0.5px; }
    #splash-sub   { font-size: 14px; color: #6B7280; margin-top: -4px; }
    #splash-ring  {
      width: 28px; height: 28px; margin-top: 8px;
      border: 3px solid #E8ECEF; border-top-color: #0099CC;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="splash">
    <div id="splash-icon">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <text x="50" y="70" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="72" font-weight="800" fill="white" style="letter-spacing:-3px">e</text>
      </svg>
    </div>
    <div id="splash-title">esep</div>
    <div id="splash-sub">Учёт для бизнеса</div>
    <div id="splash-ring"></div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      var s = document.getElementById('splash');
      if (s) {
        s.style.transition = 'opacity 0.3s';
        s.style.opacity = '0';
        setTimeout(function () { s.remove(); }, 300);
      }
    });
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/esep-sw.js', { scope: '/' })
          .then(function (r) { console.log('[Esep SW] scope:', r.scope); })
          .catch(function (e) { console.warn('[Esep SW] failed:', e); });
      });
    }
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
