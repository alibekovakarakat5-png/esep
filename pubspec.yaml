name: esep
description: Есеп — учёт доходов и налогов для ИП Казахстана
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # Local storage (offline-first)
  hive_flutter: ^1.1.0

  # UI & Charts
  fl_chart: ^0.69.0
  iconsax: ^0.0.8

  # PDF generation (счета)
  pdf: ^3.11.1
  printing: ^5.13.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  path_provider: ^2.1.3
  share_plus: ^9.0.0
  url_launcher: ^6.3.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  # fonts: раскомментировать после добавления файлов в assets/fonts/
  # Inter можно скачать с fonts.google.com/specimen/Inter
