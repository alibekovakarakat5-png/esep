<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0EA5E9"/>
      <stop offset="100%" style="stop-color:#0284C7"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.2)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="102" ry="102" fill="url(#bg)"/>

  <!-- Subtle shine overlay -->
  <rect width="512" height="256" rx="102" ry="102" fill="url(#shine)"/>

  <!-- Letter E — bold, modern -->
  <text x="256" y="340" text-anchor="middle"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="320" font-weight="800"
        fill="white" letter-spacing="-8">
    E
  </text>

  <!-- Small accent bar (calculator hint) -->
  <rect x="300" y="150" width="80" height="12" rx="6" fill="rgba(255,255,255,0.5)"/>
  <rect x="300" y="175" width="50" height="12" rx="6" fill="rgba(255,255,255,0.3)"/>
</svg>
