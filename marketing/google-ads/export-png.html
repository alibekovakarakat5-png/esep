    await new Promise(r => setTimeout(r, 350));
  }
};

// ---------- SVG → PNG ----------

async function downloadPng(it) {
  // Кодируем SVG в data URL: base64 — самый надёжный способ для file://
  const svgBytes = new TextEncoder().encode(it.svg);
  let binary = '';
  svgBytes.forEach(b => binary += String.fromCharCode(b));
  const dataUrl = 'data:image/svg+xml;base64,' + btoa(binary);

  const img = new Image();
  await new Promise((res, rej) => {
    img.onload = res;
    img.onerror = (e) => rej(new Error('Не удалось загрузить SVG: ' + (e?.message || e)));
    img.src = dataUrl;
  });

  const canvas = document.createElement('canvas');
  canvas.width = it.w;
  canvas.height = it.h;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(0, 0, it.w, it.h);
  ctx.drawImage(img, 0, 0, it.w, it.h);

  // Скачиваем как PNG
  const pngUrl = canvas.toDataURL('image/png');
  const a = document.createElement('a');
  a.href = pngUrl;
  a.download = it.out;
  document.body.appendChild(a);
  a.click();
  a.remove();
}
