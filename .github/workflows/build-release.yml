name: Build & Release APK + IPA + Web

on:
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'pubspec.yaml'
      - 'android/**'
      - 'ios/**'
      - 'web/**'
      - '.github/workflows/**'
  workflow_dispatch:  # manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── Android APK ──────────────────────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: beta
          cache: true

      - name: Generate local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/esep.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: esep-apk
          path: build/app/outputs/flutter-apk/esep.apk

  # ── iOS IPA (unsigned — for TestFlight/AdHoc later) ──────────────────────────
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: beta
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Create IPA from .app
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r esep-unsigned.ipa Payload
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: esep-ipa
          path: esep-unsigned.ipa

  # ── Web (Flutter Web → GitHub Pages) ────────────────────────────────────────
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: beta
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release --base-href "/esep/" --no-tree-shake-icons

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: esep-web
          path: build/web

  # ── Deploy Web to GitHub Pages ──────────────────────────────────────────────
  deploy-web:
    needs: [build-web]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: esep-web
          path: ./web-build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web-build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ── Create GitHub Release ────────────────────────────────────────────────────
  release:
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from pubspec
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION-$(date +%Y%m%d%H%M)" >> $GITHUB_OUTPUT

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: esep-apk
          path: ./release

      - name: Download IPA
        uses: actions/download-artifact@v4
        with:
          name: esep-ipa
          path: ./release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Esep ${{ steps.version.outputs.version }}"
          body: |
            ## Esep ${{ steps.version.outputs.version }}

            **Web:** https://alibekovakarakat5-png.github.io/esep/

            **Android:** скачайте `esep.apk` и установите (разрешите "Неизвестные источники")

            **iOS:** пока используйте веб-версию, или установите .ipa через AltStore

            ### Что нового
            - Монетизация: 4 тарифа (Бесплатный, Solo, Бухгалтер, Бухгалтер Про)
            - Демо-режим без регистрации
            - Онбординг (3 экрана)
            - Подключение банков (Kaspi, Halyk, Forte)
            - Ежедневный мониторинг лидов
            - Веб-версия для iPhone
          files: |
            ./release/esep.apk
            ./release/esep-unsigned.ipa
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Esep - Latest"
          body: |
            Последняя версия Esep. Обновляется автоматически при каждом пуше.

            **Web:** https://alibekovakarakat5-png.github.io/esep/
            **Android:** скачайте `esep.apk`
            **iOS:** используйте веб-версию или установите .ipa через AltStore
          files: |
            ./release/esep.apk
            ./release/esep-unsigned.ipa
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
