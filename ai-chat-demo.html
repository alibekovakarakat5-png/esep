<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Есеп — AI Бухгалтер</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8f9fa; height: 100vh; display: flex; flex-direction: column; }

.header { background: #fff; border-bottom: 1px solid #e8ecef; padding: 14px 20px; display: flex; align-items: center; gap: 10px; }
.header .logo { width: 36px; height: 36px; background: #0099CC; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: 20px; }
.header h1 { font-size: 18px; font-weight: 700; color: #1a1d23; }
.header .badge { background: #0099CC15; color: #0099CC; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 10px; }
.header .clear { margin-left: auto; background: none; border: none; color: #6b7280; cursor: pointer; font-size: 13px; padding: 6px 12px; border-radius: 8px; }
.header .clear:hover { background: #f0f0f0; }

.chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }

.empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; }
.empty .icon { width: 72px; height: 72px; background: #0099CC15; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; }
.empty h2 { font-size: 22px; color: #1a1d23; }
.empty p { color: #6b7280; font-size: 14px; text-align: center; line-height: 1.5; }
.prompts { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 600px; margin-top: 12px; }
.prompts button { background: #fff; border: 1px solid #e8ecef; padding: 8px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; color: #1a1d23; transition: all .15s; }
.prompts button:hover { border-color: #0099CC; color: #0099CC; background: #0099CC08; }

.msg { display: flex; gap: 8px; max-width: 85%; animation: fadeIn .2s; }
.msg.user { margin-left: auto; flex-direction: row-reverse; }
.msg .avatar { width: 32px; height: 32px; border-radius: 50%; background: #0099CC; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 15px; flex-shrink: 0; }
.msg .bubble { padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
.msg.user .bubble { background: #0099CC; color: #fff; border-bottom-right-radius: 4px; }
.msg.bot .bubble { background: #fff; color: #1a1d23; border: 1px solid #e8ecef; border-bottom-left-radius: 4px; }
.msg .copy-btn { background: none; border: none; color: #6b7280; cursor: pointer; font-size: 11px; margin-top: 4px; opacity: 0; transition: opacity .15s; }
.msg:hover .copy-btn { opacity: 1; }

.typing { display: flex; gap: 8px; align-items: center; }
.typing .avatar { width: 32px; height: 32px; border-radius: 50%; background: #0099CC; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 15px; }
.typing .dots { background: #fff; border: 1px solid #e8ecef; padding: 10px 16px; border-radius: 16px; font-size: 13px; color: #6b7280; display: flex; align-items: center; gap: 6px; }
.typing .spinner { width: 14px; height: 14px; border: 2px solid #e8ecef; border-top-color: #0099CC; border-radius: 50%; animation: spin .6s linear infinite; }

.input-bar { background: #fff; border-top: 1px solid #e8ecef; padding: 10px 12px; display: flex; gap: 8px; }
.input-bar input { flex: 1; border: none; outline: none; background: #f8f9fa; padding: 10px 16px; border-radius: 24px; font-size: 14px; }
.input-bar input::placeholder { color: #b0b7c3; }
.input-bar button { width: 42px; height: 42px; border-radius: 50%; background: #0099CC; border: none; color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.input-bar button:disabled { background: #b0b7c3; cursor: default; }

.error { background: #e74c3c15; color: #e74c3c; padding: 8px 16px; font-size: 13px; text-align: center; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 600px) {
  .msg { max-width: 92%; }
  .prompts button { font-size: 12px; padding: 6px 10px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">e</div>
  <h1>AI Бухгалтер</h1>
  <span class="badge">Groq</span>
  <button class="clear" id="clearBtn" style="display:none" onclick="clearChat()">Очистить</button>
</div>

<div class="chat" id="chat">
  <div class="empty" id="emptyState">
    <div class="icon">💬</div>
    <h2>AI Бухгалтер</h2>
    <p>Задайте любой вопрос по налогам,<br>режимам, соцплатежам и дедлайнам</p>
    <div class="prompts">
      <button onclick="sendPrompt(this.textContent)">💰 Сколько налогов на упрощёнке при доходе 5 млн?</button>
      <button onclick="sendPrompt(this.textContent)">📊 Сравни все режимы для ИП с доходом 1 млн/мес</button>
      <button onclick="sendPrompt(this.textContent)">📅 Когда сдавать 910 форму?</button>
      <button onclick="sendPrompt(this.textContent)">🧮 Сколько соцплатежей в месяц за себя?</button>
      <button onclick="sendPrompt(this.textContent)">🏢 Когда вставать на учёт по НДС?</button>
      <button onclick="sendPrompt(this.textContent)">❓ Чем отличается ЕСП от самозанятого?</button>
    </div>
  </div>
</div>

<div class="error" id="error" style="display:none"></div>

<div class="input-bar">
  <input type="text" id="input" placeholder="Задайте вопрос по налогам..." onkeydown="if(event.key==='Enter')send()">
  <button id="sendBtn" onclick="send()">➤</button>
</div>

<script>
const API = 'http://localhost:3001/api/ai-chat';
let messages = [];
let loading = false;

function send() {
  const text = input.value.trim();
  if (!text || loading) return;
  input.value = '';
  sendPrompt(text);
}

async function sendPrompt(text) {
  if (loading) return;
  loading = true;
  sendBtn.disabled = true;
  error.style.display = 'none';
  emptyState.style.display = 'none';
  clearBtn.style.display = 'block';

  messages.push({ role: 'user', content: text });
  addMessage('user', text);
  showTyping();

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages }),
    });
    const data = await res.json();
    hideTyping();

    if (!res.ok) {
      error.textContent = data.error || 'Ошибка сервера';
      error.style.display = 'block';
    } else {
      messages.push({ role: 'assistant', content: data.reply });
      addMessage('bot', data.reply);
    }
  } catch (e) {
    hideTyping();
    error.textContent = 'Нет соединения с сервером';
    error.style.display = 'block';
  }
  loading = false;
  sendBtn.disabled = false;
  input.focus();
}

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = `msg ${role === 'user' ? 'user' : 'bot'}`;
  if (role === 'user') {
    div.innerHTML = `<div class="bubble">${esc(text)}</div>`;
  } else {
    div.innerHTML = `
      <div class="avatar">e</div>
      <div>
        <div class="bubble">${esc(text)}</div>
        <button class="copy-btn" onclick="copy(this)">📋 Копировать</button>
      </div>`;
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typingIndicator';
  div.innerHTML = `<div class="avatar">e</div><div class="dots"><div class="spinner"></div> Считаю...</div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function clearChat() {
  messages = [];
  chat.innerHTML = '';
  emptyState.style.display = 'flex';
  chat.appendChild(emptyState);
  clearBtn.style.display = 'none';
  error.style.display = 'none';
}

function copy(btn) {
  const text = btn.previousElementSibling.textContent;
  navigator.clipboard.writeText(text);
  btn.textContent = '✓ Скопировано';
  setTimeout(() => btn.textContent = '📋 Копировать', 1500);
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>

</body>
</html>
